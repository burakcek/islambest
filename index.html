    Научете ја следната дова на памет и кажувајте ја редовно, особено навечер и наутро:
    > „Аллахумме инни ес'елукел-џеннетел-Фирдевс. Аллахумме инни ес'елукел-'афијех фид-дунја вел-ахирех. Аллахумме е'инни 'ала зикрике шекрике ве хусни 'ибадетике." (Аллаху мој, барам од Тебе Рајот Фирдаус. Аллах, барам од Тебе благосостојба на овој свет и на оној свет. Аллаху мој, помогни ми да Те спомнувам, да Ти се заблагодарувам и добро да Те обожувам.)

    ## Заклучок: Како да ги разбереме „најдобрите-упатствата"?

    Во оваа книга собравме многу хадиси во кои Пратеникот, саллаллаху алејхи ве селлем, вели дека некое дело или нешто е „**најдобро"**, „**највредно"**, „**најмило"** или „**најголемо"**. На прв поглед, може да изгледа дека овие изјави се меѓусебно противречни: како може и верата во Аллах да е најдобро дело, и борба на Аллаховиот патот, и молитвата, и добрината кон родителите, и зборувањето вистина -- сите да бидат „најдобри"?

    Учените на исламот (улемата) одамна го забележале ова и изработиле јасна методологија за разбирање на овие изјави. Еве ги најважните начела според кои тие се усогласуваат -- а сите тие се засновани токму на текстовите што ги прочитавте.

    **1. Различни прашања добиваат различни одговори -- во зависност од состојбата на прашувачот**
    Пратеникот, а.с., го прилагодувал одговорот според тоа кој го прашува и во каква состојба се наоѓа тој. Она што е „најдобро" за еден човек (кој е силен и способен) не е исто што е „најдобро" за друг (кој е слаб или нов во верата).

    **2. Секое „најдобро" се однесува на најдоброто во својата категорија**
    На пример: најдобар пост после Рамазан, најдобар доброволен намаз, најдобар вид садака, најдобар аспект на исламот. Ова е наједноставното и најдоследното усогласување.

    **3. Некои одговори го истакнуваат она што е најдобро во даден контекст или момент**
    Она што е најдобро во војна (борба на Аллаховиот пат) не е исто што е најдобро во мир (добрососедство). Она што е најдобро за поединецот не е секогаш најдобро за заедницата.

    **4. Некои изјави за „најдобро" се однесуваат на општата корист, а не на наградата**
    Најдобриот муслиман е оној од чиј јазик и раце другите се мирни -- ова го чува општеството. Тоа не значи дека тоа е „најдобро" дело во апсолутна смисла, туку дека носи најголема корист за заедницата.

    **5. Некои хадиси го опишуваат „најдоброто" во однос на релативната награда, не на апсолутната доблест**
    На пример: „Најдобриот пост после Рамазан е во Мухарем" -- ова е за наградата на доброволниот пост, а не за најдоброто дело воопшто.

    **6. Некои изјави за „најдобро" ја нагласуваат итностa или тежината на делото**
    Давање садака кога си здрав и скржав, плашејќи се од сиромаштија -- ова е „најдобро" затоа што е потешко, па затоа и наградата е поголема.

    **7. Некои се најдобри за заедницата, некои за поединецот**
    Кога прашувале за најдобар муслиман, одговорот бил за безбедност на заедницата. Кога прашувале за најдобро дело, одговорот бил за големите обреди.

    **Што научивме од ова?**
    Сите овие изјави за „најдобро" носи одговор на прашањето:
    - Што е најдобро во оваа категорија? (на пр. најдобар пост после Рамазан)
    - Што е најдобро за овој човек, во неговата ситуација? (на пр. кога не може да се бори, најдобро е да не им пречи на луѓето)
    - Што е најдобро за заедницата? (на пр. безбедност од јазикот и рацете)
    - Што е најдобро во овој момент (најтешко, па највредно)? (на пр. давање садака кога си скржав)

    Затоа, драг читателу, не се збунувај кога ќе видиш различни „нај-упатства". Сите тие се дел од една целина: **верата во Аллах е коренот, а доброто однесување кон луѓето е плодот**. Тргни од она што е најлесно за тебе, па напредувај кон повисоките степени. И секогаш барај го она што е **најдобро** според твоите можности -- зашто Аллах, субханеху ве те'ала, го сака најдоброто од Своите робови.
    `;

        // и ќе го земеме текстот до следниот таков наслов.
        const chapters = [];
        // regex за наслови: ##  (број или збор)
        const headerRegex = /^##\s+(.*?)(?:\s*\(.*?\))?$/gm;
        let match;
        let lastIndex = 0;
        // Прво најди ги сите наслови и нивните позиции
        const headers = [];
        while ((match = headerRegex.exec(text)) !== null) {
            const title = match[1].trim();
            headers.push({
                title: title,
                index: match.index,
                end: match.index + match[0].length
            });
        }

        // Ако нема наслови, врати празно
        if (headers.length === 0) {
            // Пробај да ги најдеш по "Содржина" - можеби нема ## пред секое
            // Ќе пробаме да ги земеме од содржината
            // Најди ги сите линии со број и точка
            const lines = text.split('\n');
            let inContent = false;
            let contentChapters = [];
            for (let line of lines) {
                if (line.trim().startsWith('Содржина')) {
                    inContent = true;
                    continue;
                }
                if (inContent && line.trim().match(/^\[\d+\./)) {
                    const parts = line.split('--');
                    if (parts.length >= 2) {
                        const titlePart = parts[0].replace(/^\[\d+\.\s*/, '').trim();
                        contentChapters.push(titlePart);
                    }
                }
                if (inContent && line.trim() === '') continue;
                if (inContent && !line.trim().match(/^\[\d+\./)) {
                    // Заврши содржина
                    inContent = false;
                }
            }
            // Сега пробај да ги најдеш насловите во текстот
            // Ќе користиме едноставен split по "## "
            const parts = text.split('## ');
            for (let i = 1; i < parts.length; i++) {
                const part = parts[i];
                const lines2 = part.split('\n');
                const title = lines2[0].trim();
                // телото е остатокот
                let body = lines2.slice(1).join('\n');
                // Треба да го најдеме крајот на ова поглавје (пред следниот "## ")
                // Нема да го правиме тоа тука, туку ќе го земеме целиот текст на поглавјето
                // Поради големината ќе го земеме до следниот "## " - но ние веќе ги имаме поделено.
                // Ќе го земеме како што е.
                // Но мора да ги филтрираме не-насловите како "Содржина"
                if (title && !title.includes('Скопје') && !title.includes('Содржина')) {
                    chapters.push({
                        number: i,
                        title: title,
                        body: body.trim()
                    });
                }
            }
            return chapters;
        }

        // Ако има наслови, земи ги сите
        for (let i = 0; i < headers.length; i++) {
            const h = headers[i];
            const startIdx = h.end;
            const endIdx = (i + 1 < headers.length) ? headers[i + 1].index : text.length;
            const body = text.substring(startIdx, endIdx).trim();
            // Исклучи ги воведните делови
            if (h.title.includes('ВОВЕД') || h.title.includes('Содржина') || h.title.includes('Заклучок')) {
                // Но сепак ги додаваме
            }
            chapters.push({
                number: i + 1,
                title: h.title,
                body: body
            });
        }
        return chapters;
    }

    // ===================================================================
    // 3. ГЕНЕРИРАЊЕ НА КНИГАТА СО TURN.JS
    // ===================================================================

    $(document).ready(function() {
        const chapters = parseChapters(fullText);
        if (chapters.length === 0) {
            $('#book').html('<div style="padding:40px;color:#ff8866;">Не се пронајдени поглавја. Проверете го форматот.</div>');
            return;
        }

        // Пополни ја навигацијата
        const navList = $('#navList');
        chapters.forEach((ch, idx) => {
            const btn = $('<button class="nav-item"></button>');
            const num = ch.number || idx + 1;
            const shortTitle = ch.title.length > 30 ? ch.title.substring(0, 28) + '…' : ch.title;
            btn.html(`<span>${num}. ${shortTitle}</span>`);
            btn.data('index', idx);
            btn.on('click', function() {
                const i = $(this).data('index');
                goToPage(i);
                $(this).addClass('active').siblings().removeClass('active');
            });
            navList.append(btn);
        });

        // Изгради ги страниците за Turn.js
        // Секое поглавје ќе биде една страница (ако има многу текст, ќе се прелее, но turn.js поддржува overflow)
        // Поради големината, ќе направиме по една страница по поглавје.
        const pages = chapters.map((ch, idx) => {
            const num = ch.number || idx + 1;
            // Ограничи ја должината на телото ако е премногу долга (ќе се скрати во HTML)
            let bodyHtml = ch.body;
            // Ако телото е премногу долго, ќе го скратиме со "..." но подобро да се покаже цело
            // Ќе додадеме стил за скролување
            return `
                <div class="turn-page" data-index="${idx}">
                    <h2>${num}. ${ch.title}</h2>
                    <div style="overflow-y:auto;max-height:460px;padding-right:8px;">
                        ${bodyHtml.replace(/\n/g, '<br>')}
                    </div>
                    <div class="page-number">${num} / ${chapters.length}</div>
                </div>
            `;
        });

        // Вметни ги страниците во книгата
        const book = $('#book');
        book.html(pages.join(''));

        // Иницијализирај Turn.js
        book.turn({
            width: 900,
            height: 600,
            autoCenter: true,
            display: 'double',
            acceleration: true,
            gradients: true,
            elevation: 50,
            when: {
                turned: function(e, page) {
                    // Активна страница во навигација
                    const pageNum = page - 1; // turn.js користи 1-базиран индекс
                    const navItems = $('.nav-item');
                    navItems.removeClass('active');
                    if (pageNum >= 0 && pageNum < navItems.length) {
                        $(navItems[pageNum]).addClass('active');
                    }
                    // Скролирај навигацијата до активниот елемент
                    const activeNav = $('.nav-item.active');
                    if (activeNav.length) {
                        const container = $('#nav');
                        const top = activeNav.position().top + container.scrollTop() - 60;
                        container.animate({ scrollTop: top }, 200);
                    }
                }
            }
        });

        // Реагирај на промена на големината
        $(window).on('resize', function() {
            const width = $('#book-container').width() - 40;
            const height = $(window).height() - 140;
            const newWidth = Math.min(width, 900);
            const newHeight = Math.min(height, 600);
            book.turn('size', newWidth, newHeight);
        });

        // Функција за одење до страница
        function goToPage(idx) {
            // idx е 0-базиран, turn.js користи 1-базиран
            const page = idx + 1;
            if (page >= 1 && page <= book.turn('pages')) {
                book.turn('page', page);
            }
        }

        // Навигациони копчиња
        $('#prevPage').on('click', function() {
            book.turn('previous');
        });
        $('#nextPage').on('click', function() {
            book.turn('next');
        });
        $('#goToFirst').on('click', function() {
            goToPage(0);
        });

        // По иницијализација, отвори прва страница
        setTimeout(function() {
            goToPage(0);
            $('.nav-item').first().addClass('active');
        }, 300);

        // Стави го референцата на функцијата во глобален обем за debug
        window.goToPage = goToPage;
    });
    </script>
